from langchain_openai import ChatOpenAI

class InstitutionSchema(BaseModel):
    founder: str
    fyear: str
    branches: str
    employees: str
    summary: str

from langchain_core.output_parsers import BaseOutputParser

class Parser(BaseOutputParser):
    def get_format_instructions(self):
        return """Give output in this format:
                  Founder -
                  Founded Year -
                  Branches -
                  Employees -
                  Summary -
        """

    def parse(self, text):
        data = {}
        for line in text.split("\n"):
            if "-" in line:
                key, value = line.split("-", 1)
                data[key.strip()] = value.strip()
        return data

parser = Parser()

prompt = PromptTemplate(
    template="""
Extract the following details from the text:
{format_instructions}
Text:
{text}
""",
    input_variables=["text"],
    partial_variables={"format_instructions": parser.get_format_instructions()}
)

llm = ChatCohere(model_name="command-xlarge-nightly")

chain = prompt | llm | parser

institution_name = input("Enter Institution Name: ")

try:
    wiki_text = wikipedia.summary(institution_name, sentences=10)
except:
    wiki_text = "No data found"

print("\n--- Wikipedia Data ---\n")
print(wiki_text)

result = chain.invoke({"text": wiki_text})
